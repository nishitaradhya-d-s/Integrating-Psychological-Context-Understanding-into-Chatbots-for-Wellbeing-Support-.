<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    :root {
      --primary-color: #6ac5fe;
      --secondary-color: #1a3c5e;
      --background-color: rgba(255, 255, 255, 0.1);
      --text-color: #fff;
      --button-color: #6ac5fe;
      --button-text-color: #1a3c5e;
      --font-size: 16px;
      --border-radius: 20px;
      --animation-speed: 0.5s;
    }

    body {
      background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                  url('https://images.unsplash.com/photo-1593811167562-9cef47bf5a07?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80') no-repeat center center fixed;
      background-size: cover;
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      font-size: var(--font-size);
      overflow-x: hidden;
    }

    /* Animated background elements */
    .floating-elements {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .floating-element {
      position: absolute;
      border-radius: 50%;
      background: rgba(106, 197, 254, 0.1);
      animation: float 15s infinite ease-in-out;
    }

    .floating-element:nth-child(1) {
      width: 80px;
      height: 80px;
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }

    .floating-element:nth-child(2) {
      width: 120px;
      height: 120px;
      top: 70%;
      left: 80%;
      animation-delay: 2s;
    }

    .floating-element:nth-child(3) {
      width: 60px;
      height: 60px;
      top: 50%;
      left: 20%;
      animation-delay: 4s;
    }

    .floating-element:nth-child(4) {
      width: 100px;
      height: 100px;
      top: 20%;
      left: 70%;
      animation-delay: 6s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.7;
      }
      33% {
        transform: translateY(-20px) rotate(120deg);
        opacity: 0.4;
      }
      66% {
        transform: translateY(10px) rotate(240deg);
        opacity: 0.9;
      }
    }

    .auth-card {
      max-width: 450px;
      width: 100%;
      background-color: var(--background-color);
      backdrop-filter: blur(10px);
      border-radius: var(--border-radius);
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      animation: fadeInUp 1s ease-out;
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(106, 197, 254, 0.1), transparent);
      transform: rotate(45deg);
      animation: shine 8s infinite linear;
      pointer-events: none;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shine {
      0% {
        transform: rotate(45deg) translateX(-100%);
      }
      100% {
        transform: rotate(45deg) translateX(100%);
      }
    }

    .auth-card h2 {
      font-size: 2.2rem;
      margin-bottom: 25px;
      color: var(--text-color);
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      animation: textGlow 3s infinite alternate;
    }

    @keyframes textGlow {
      from {
        text-shadow: 0 0 5px rgba(106, 197, 254, 0.5);
      }
      to {
        text-shadow: 0 0 15px rgba(106, 197, 254, 0.8), 0 0 20px rgba(106, 197, 254, 0.6);
      }
    }

    .auth-card form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 20px;
    }

    .auth-card input {
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-color);
      font-size: 1rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }

    .auth-card input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .auth-card input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 10px rgba(106, 197, 254, 0.5);
      transform: translateY(-2px);
    }

    .auth-card input:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 15px 30px;
      background: var(--button-color);
      color: var(--button-text-color);
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(106, 197, 254, 0.4);
      border: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      margin-top: 10px;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      background: #8fd3ff;
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 6px 20px rgba(106, 197, 254, 0.6);
    }

    .btn i {
      margin-right: 10px;
      font-size: 1.2rem;
      transition: transform 0.3s ease;
    }

    .btn:hover i {
      transform: translateX(5px);
    }

    .auth-card p {
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.8);
    }

    .auth-card a {
      color: var(--primary-color);
      text-decoration: none;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .auth-card a:hover {
      color: #8fd3ff;
      text-shadow: 0 0 10px rgba(106, 197, 254, 0.5);
    }

    /* Success/Error message styling */
    .message {
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      font-weight: 500;
      display: none;
      animation: fadeIn 0.5s ease-out;
    }

    .message.success {
      background: rgba(46, 204, 113, 0.2);
      border: 1px solid rgba(46, 204, 113, 0.5);
      color: #2ecc71;
    }

    .message.error {
      background: rgba(231, 76, 60, 0.2);
      border: 1px solid rgba(231, 76, 60, 0.5);
      color: #e74c3c;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Loading animation */
    .loading {
      display: none;
      text-align: center;
      margin-top: 10px;
    }

    .loading-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary-color);
      margin: 0 3px;
      animation: loading 1.4s infinite ease-in-out both;
    }

    .loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes loading {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Password toggle */
    .password-container {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .toggle-password:hover {
      color: var(--primary-color);
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .auth-card {
        padding: 30px 20px;
      }
      
      .auth-card h2 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body class="auth-page">
  <div class="floating-elements">
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>
    <div class="floating-element"></div>
  </div>

  <div class="card auth-card">
    <h2>Welcome Back</h2>
    <div id="message" class="message"></div>
    <form id="loginForm" onsubmit="submitLogin(event)">
      <input name="email" type="email" placeholder="Email" required>
      <div class="password-container">
        <input name="password" type="password" placeholder="Password" id="password" required>
        <button type="button" class="toggle-password" id="togglePassword">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <button type="submit" class="btn">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
      <div class="loading" id="loading">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </form>
    <p>New user? <a href="{{ url_for('signup') }}">Sign up</a></p>
  </div>

  <script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
      const passwordInput = document.getElementById('password');
      const icon = this.querySelector('i');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });
    
    function showMessage(text, type) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.className = `message ${type}`;
      message.style.display = 'block';
    }
    
    function submitLogin(e) {
      e.preventDefault();
      const form = document.getElementById('loginForm');
      const fd = new FormData(form);
      const loading = document.getElementById('loading');
      
      // Show loading animation
      loading.style.display = 'block';
      
      // Simulate API call (replace with your actual fetch call)
      setTimeout(() => {
        fetch('{{ url_for("login") }}', {
          method: 'POST', 
          body: fd
        }).then(r=>r.json()).then(res=>{
          loading.style.display = 'none';
          
          if(res.status==='noemail'){ 
            showMessage(res.message, 'error');
          }
          else if(res.status==='wrongpass'){ 
            showMessage(res.message, 'error');
          }
          else if(res.status==='admin'){ 
            showMessage('Welcome Admin! Redirecting...', 'success');
            setTimeout(() => {
              window.location.href = '{{ url_for("admin_dashboard") }}'.replace('/admin_dashboard','/admin');
            }, 1000);
          }
          else if(res.status==='ok'){ 
            showMessage('Login successful! Redirecting...', 'success');
            setTimeout(() => {
              window.location.href = '{{ url_for("dashboard") }}';
            }, 1000);
          }
          else {
            showMessage(res.message, 'error');
          }
        }).catch(err => {
          loading.style.display = 'none';
          showMessage('An error occurred. Please try again.', 'error');
        });
      }, 1500);
    }
  </script>
</body>
</html>
